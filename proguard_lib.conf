# ProGuard configuration for ble-api library jar.
#
# The library is distributed as a jar consumed by third-party applications.
# We keep all public API types and members intact so that callers can reference
# them by name. Internal implementation details may be optimised or obfuscated.
#
# Reference: https://www.guardsquare.com/manual/configuration/usage

# -----------------------------------------------------------------------
# Keep the entire public API package untouched.
# -----------------------------------------------------------------------
-keep public class ch.varani.lego.ble.api.** {
    public *;
    protected *;
}

# -----------------------------------------------------------------------
# Keep Javadoc-visible annotations so that tooling (e.g. IDEs) can read them.
# -----------------------------------------------------------------------
-keepattributes *Annotation*
-keepattributes Signature
-keepattributes InnerClasses
-keepattributes EnclosingMethod
-keepattributes Exceptions
-keepattributes SourceFile
-keepattributes LineNumberTable

# -----------------------------------------------------------------------
# Do not warn about missing references to platform BLE APIs that are only
# present at runtime (loaded reflectively per OS).
# -----------------------------------------------------------------------
-dontwarn ch.varani.lego.ble.impl.**

# -----------------------------------------------------------------------
# Keep enum values and special methods that are accessed reflectively by
# the JVM itself.
# -----------------------------------------------------------------------
-keepclassmembers enum * {
    public static **[] values();
    public static ** valueOf(java.lang.String);
}

# -----------------------------------------------------------------------
# Keep serialisation hooks for any Serializable classes.
# -----------------------------------------------------------------------
-keepclassmembers class * implements java.io.Serializable {
    static final long serialVersionUID;
    private void writeObject(java.io.ObjectOutputStream);
    private void readObject(java.io.ObjectInputStream);
    java.lang.Object writeReplace();
    java.lang.Object readResolve();
}
